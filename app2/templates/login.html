<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Acceso — RAUDIE</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="{% static 'img/favicon.png' %}" type="image/png">
    <link rel="stylesheet" href="{% static 'css/login-styles.css' %}">
</head>
<body class="admin-login">
    <div class="login-card">

        <!-- Header rojo con logo -->
        <div class="login-header">
            <div class="logo-container">
                <img src="{% static 'img/favicon-white.png' %}" alt="Logo RAUDIE" class="logo-img">
            </div>
            <div class="role-badge">
                <i class="fas fa-shield-halved"></i>
                <span>Panel de Control</span>
            </div>
        </div>

        <!-- Formulario -->
        <div class="login-form-wrapper">

            {% if messages %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                <div>
                    {% for message in messages %}
                        <p style="margin:0;">{{ message }}</p>
                    {% endfor %}
                </div>
            </div>
            {% endif %}

            <form class="login-form" method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="nombre">Usuario</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-control" id="nombre" name="nombre"
                               placeholder="Ingresa tu usuario" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Ingresa tu contraseña" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()" title="Mostrar/ocultar">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Ingresar</span>
                </button>
            </form>
        </div>

        <div class="login-footer">
            <p>© 2025 <strong>RAUDIE</strong> — Todos los derechos reservados</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.querySelector('.password-toggle i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>

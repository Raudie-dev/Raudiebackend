{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enlaces</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background:#f8f9fa; }
    .linkbox { max-width:420px; margin:45px auto; text-align:center; }
    .avatar { width:96px; height:96px; border-radius:50%; display:block; margin:18px auto; object-fit:cover }
    .btn-linktree { display:block; width:100%; text-align:center; margin-bottom:10px; padding:12px 18px; }
    .title { font-size:1.25rem; margin-bottom:6px; }
    .subtitle { color:#666; margin-bottom:18px; }
  </style>
</head>
<body>
  <div class="linkbox">
    <img src="{% static 'images/logo.png' %}" alt="logo" class="avatar" onerror="this.style.display='none'">
    <div class="title">Mi Linktree</div>
    <div class="subtitle">Encuentra mis recursos rápidos</div>

    <!-- Enlaces estáticos a redes sociales comunes -->
    <a class="btn btn-linktree btn btn-primary" href="https://github.com/" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-github me-2"></i>GitHub
    </a>
    <a class="btn btn-linktree btn btn-info text-white" href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-linkedin me-2"></i>LinkedIn
    </a>
    <a class="btn btn-linktree btn btn-danger" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-instagram me-2"></i>Instagram
    </a>
    <a class="btn btn-linktree btn btn-secondary" href="https://twitter.com/" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-twitter me-2"></i>X / Twitter
    </a>
    <a class="btn btn-linktree btn btn-success" href="https://wa.me/" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-whatsapp me-2"></i>WhatsApp
    </a>

    <div class="mt-3 small text-muted">Última actualización: {{ now|date:'Y-m-d' }}</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
